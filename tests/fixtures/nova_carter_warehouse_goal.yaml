# nova_carter_warehouse_goal.yaml — platform-side COPY of the consumer scenario (M1 standard input).
#
# SOURCE OF TRUTH: cv-infra-user@f1c9607 scenarios/nova_carter_warehouse_goal.yaml
#   + apiVersion pending canonical sync(T3) — D-1' strict (2026-07-10) requires the
#   key; CV-User adds it to the canonical scenario this cycle, PM merge gate
#   cross-diffs. Bump the sha above on re-sync.
# This is a COPY. The platform may not reference the consumer repo by relative path
# (boundary rule 3), so drift is prevented mechanically by
# tests/test_fixture_canonical_guard.py below (fixture params are bound to the keys
# the oracles actually read) and by the PM merge-gate cross-repo diff.
#
# Kept SEMANTICALLY IDENTICAL to the source; only this header differs. Re-sync on any
# consumer change and bump the sha above. The cycle-3 draft this replaced had
# `goal_tolerance_m: 0.5` (never read by reached_goal -> silently ignored, oracle
# default 0.25 m applied) and empty no_collision params (chassis_path absent ->
# telemetry.bind() raises on a real runner) — exactly the drift the guard now blocks.
#
# The body below instantiates the platform-owned Scenario shape (M1) — CV-User does
# not define the schema, only exercises it as a consumer. Values are cycle-5 T4
# workstation bringup measurements (provenance in the source file's own comments).

apiVersion: cv-infra/v1                  # versioned contract (NFR-INTAKE-002) — REQUIRED since
                                         #   D-1' strict (absent => friendly reject + exit 2)

scenario:
  scene: nova_carter_warehouse          # static warehouse map (carter_warehouse_navigation)
  robot: nova_carter
  goal:                                  # map extent x[-11.975,12.03] y[-17.975,20.83];
    x: -6.0                              #   AMCL start pose is (-6.0, -1.0, yaw=pi). This goal
    y: 5.0                               #   is a short straight drive up the same lane.
    yaw: 1.5708                          #   Pass-proven live (cycle-5 bringup run2/run6) — values unchanged.
    frame: map
  seed: 42                               # fixed seed for determinism (REQ-EXEC-003, NFR-EXEC-001)
  timeout_s: 120                         # mission timeout (REQ-EXEC-007) — value unchanged from draft

sut:
  image_ref: carter-sut:p2               # first workstation build (D-1 hybrid local build, FU-10 pin #2):
                                         #   Image Id sha256:47aff5c993dac05b1664482e44af9401073336f142cb6d4919d81b47f8f9d48a
                                         #   (local tag => no RepoDigest; the Image Id IS the pin)

interface:
  type: ros2                             # REQ-EXEC-004 (adapter type; only ros2 for MVP)
  adapter_config:                        # M1 canonical Ros2AdapterConfig — unknown keys loud-reject
    ros_distro: jazzy
    rmw: rmw_fastrtps_cpp
    use_sim_time: true                   # measured: /clock sub = 20 nodes (REQ-EXEC-003)
    goal_interface:                      # REQ-EXEC-007 — measured: server = bt_navigator
      kind: action
      name: /navigate_to_pose
      type: nav2_msgs/action/NavigateToPose
    cmd_vel:                             # SUT publishes -> sim actuates (REQ-EXEC-006)
      topic: /cmd_vel
      type: geometry_msgs/msg/Twist      # measured: Twist (NOT TwistStamped), 2 publishers
    clock_topic: /clock                  # sim publishes -> use_sim_time (REQ-EXEC-003)
    odom_topics:                         # odom dualization (measured) — wire the SAME Odometry stream to BOTH:
      - /odom                            #   controller_server (nav2 default; carter params don't override)
      - /chassis/odom                    #   bt_navigator + odom_smoother (carter params)
    sensors:                             # sim publishes -> SUT subscribes (REQ-EXEC-006)
      - topic: /front_3d_lidar/lidar_points
        type: sensor_msgs/msg/PointCloud2
        frame: front_3d_lidar            # measured pointcloud_to_laserscan target_frame
      - topic: /front_2d_lidar/scan      # local_costmap front_2d_lidar_layer (carter params)
        type: sensor_msgs/msg/LaserScan
        frame: front_2d_lidar            # measured OmniGraph frameId (cycle-5 bringup, FU-13-4)
      - topic: /back_2d_lidar/scan       # local_costmap back_2d_lidar_layer (carter params)
        type: sensor_msgs/msg/LaserScan
        frame: back_2d_lidar             # measured OmniGraph frameId (cycle-5 bringup, FU-13-4)
    frames:
      map: map
      odom: odom
      base_link: base_link               # SUT publishes map->odom only (amcl); odom->base_link TF = sim's job
    readiness:                           # measured: action server is DDS-discoverable even while inactive,
      is_active_service: /lifecycle_manager_navigation/is_active   # so gate on this Trigger service instead

acceptance_criteria:                     # MVP: reach goal within timeout AND zero collision (REQ-EXEC-011)
  - oracle: reached_goal                 # REQ-EXEC-010/012
    params:
      position_tolerance_m: 0.75         # oracle-canonical key (draft `goal_tolerance_m` was silently
                                         #   ignored -> oracle default 0.25). Value measured (cycle-5
                                         #   bringup): AMCL + nav2 xy-tol stack intermittently exceeds
                                         #   0.5 (run5 FAIL >0.5; run6 0.414; run7 0.245) -> 0.75 margin
      yaw_tolerance_rad: 0.26            # ~15 deg — oracle-canonical key, value unchanged; yaw check
                                         #   stays inactive while goal_orientation_wxyz is unset
  - oracle: no_collision                 # REQ-EXEC-010/011 (collision_count == 0)
    params:
      chassis_path: /World/Nova_Carter_ROS/chassis_link   # measured (bringup probe-01):
                                         #   RigidBody+ArticulationRoot; required — absent =>
                                         #   intentional loud fail (P2-13 precondition)
      collision_excluded_paths:          # measured contact partners (bringup run1, D-E reduction):
        - /World/Nova_Carter_ROS         #   self-body subtree (wheels/casters)
        - /World/warehouse_with_forklifts/GroundPlane   # floor collision plane
